name: build-all

# 仓库写入权限
permissions:
  contents: write
  
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for test build'
        required: true
        default: 'test'
        type: string
jobs:
  # ========================
  # 1️⃣ 并行调用各平台
  # ========================
  windows:
    uses: ./.github/workflows/build-windows.yml

  # android:
  #   uses: ./.github/workflows/build-android.yml
  #   secrets: inherit

  linux:
    uses: ./.github/workflows/build-linux.yml

  macos:
    uses: ./.github/workflows/build-macos.yml

  # ========================
  # 2️⃣ 汇总 + 发布
  # ========================
  release:
    # needs: [windows, android, linux, macos]
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show files
        run: ls -R artifacts

      # 生成 tag
      - name: Determine tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${{github.event.inputs.tag}}"
            git tag -f "$TAG_NAME"
            git push origin "$TAG_NAME" --force
          fi
          # 去掉前缀 v
          TAG_NAME_CLEAN="${TAG_NAME#v}"

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "tag_name_clean=$TAG_NAME_CLEAN" >> $GITHUB_OUTPUT

      # 创建 Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.tag_name }}
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
      # 复制到服务器
      - name: Deploy via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}      # 服务器IP/域名
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}   # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }} # SSH私钥
          source: "artifacts/*"                   # 要上传的文件
          target: ${{ secrets.RELEASE_PATH_PREFIX }}/${{ steps.tag.outputs.tag_name_clean }}  # 服务器目标路径
          rm: false                           # 上传前清空目标目录
          overwrite: true                    # 强制覆盖现有文件
          
